<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Dashboard Pipeline</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>.active-menu { background-color: #3b82f6 !important; color: white !important; }</style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
  <div class="w-64 bg-slate-900 text-gray-300 flex flex-col justify-between shadow-lg">
    <div>
      <div class="p-5 text-xl font-bold text-white border-b border-slate-800 tracking-wider">📦 SCAN ENGINE</div>
      <nav class="mt-5 px-3 space-y-1">
        <a href="index.html" id="btn-dashboard" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📊 Dashboard</a>
        <a href="daily-scan.html" id="btn-daily-scan" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🔍 Daily Scan</a>
        <a href="tracking.html" id="btn-tracking" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📦 Tracking Engine</a>
        <a href="inventory.html" id="btn-inventory" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🏭 Inventory</a>
        <a href="payment.html" id="btn-payment" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">💳 Payment</a>
        <a href="setting.html" id="btn-setting" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">⚙️ Settings</a>
      </nav>
    </div>
  </div>
  <div class="flex-1 flex flex-col overflow-y-auto">
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between"><h1 class="text-xl font-semibold text-gray-800">Operational Analytics Dashboard</h1><div id="dashLoadingStatus" class="text-sm text-orange-500 font-medium">Connecting...</div></header>
    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200"><h3 class="text-gray-400 font-medium text-sm uppercase">Total Operational Scans</h3><p id="totalScans" class="text-3xl font-bold text-gray-800 mt-2">0</p></div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200"><h3 class="text-gray-400 font-medium text-sm uppercase">Active Pickups</h3><p id="totalPickups" class="text-3xl font-bold text-green-600 mt-2">0</p></div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200"><h3 class="text-gray-400 font-medium text-sm uppercase">Returns Managed</h3><p id="totalReturns" class="text-3xl font-bold text-red-600 mt-2">0</p></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
