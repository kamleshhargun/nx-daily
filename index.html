<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily QR Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <style>
    :root {
      --bg-gradient: #f8fafc;
      --card-bg: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --card-radius: 14px;
      --btn-radius: 10px;
      --input-bg: #f1f5f9;
      --panel-shadow: 0 2px 12px rgba(148, 163, 184, 0.06);
    }

    [data-theme="dark"] {
      --bg-gradient: #0f172a;
      --card-bg: #1e293b;
      --border-color: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --input-bg: #0f172a;
      --panel-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px;
    }

    .top-actions {
      width: 100%;
      max-width: 440px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .circle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--panel-shadow);
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      text-align: center;
      margin-bottom: 2px;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.8rem; color: var(--text-muted); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 16px;
      box-shadow: var(--panel-shadow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--btn-radius);
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }

    .btn:active { transform: scale(0.99); }
    .btn-primary { background: var(--primary); }
    .btn-success { background: var(--success); }

    .btn-mode-p { background: transparent; color: var(--success); border: 2px solid var(--success); }
    .btn-mode-p.active { background: var(--success) !important; color: #fff !important; }
    .btn-mode-r { background: transparent; color: var(--danger); border: 2px solid var(--danger); }
    .btn-mode-r.active { background: var(--danger) !important; color: #fff !important; }
    .btn-secondary { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); }

    .hidden { display: none !important; }

    .slide-panel {
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slide-panel.open { max-height: 140px; margin-top: 10px; }
    .mode-indicators { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sub-panel { display: flex; flex-direction: column; gap: 10px; }

    .text-input {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--btn-radius);
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
    }

    #scanner-container {
      width: 100%;
      border-radius: var(--btn-radius);
      overflow: hidden;
      border: 2px dashed var(--text-muted);
      background: #000;
    }
    #qr-reader { width: 100% !important; border: none !important; }
    #qr-reader__dashboard, #qr-reader__header { display: none !important; }

    .result-table { width: 100%; border-collapse: collapse; }
    .result-table td { padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
    .result-table td:first-child { color: var(--text-muted); width: 35%; }
    .result-table td:last-child { color: var(--text-main); font-weight: 600; text-align: right; }

    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
    .badge-pickup { background: rgba(16, 185, 129, 0.12); color: #10b981; }
    .badge-return { background: rgba(239, 68, 68, 0.12); color: #ef4444; }

    .count-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .filter-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .date-picker { flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-main); font-size: 0.85rem; }
    
    .clear-filter-btn {
      background: var(--danger); color: white; border: none; width: 34px; height: 34px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    .tree-node { margin-bottom: 4px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
    .tree-header { background: var(--input-bg); padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .tree-chips { display: flex; gap: 4px; }
    .chip { font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; font-weight: 600; }
    .chip-p { background: rgba(16, 185, 129, 0.12); color: #10b981; }
    .chip-r { background: rgba(239, 68, 68, 0.12); color: #ef4444; }
    .tree-content { padding: 6px 10px; background: var(--card-bg); display: none; flex-direction: column; gap: 4px; }

    .bulk-operational-tab { background: rgba(79, 70, 229, 0.04); border: 1px dashed var(--primary); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
    .bulk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .btn-bulk { padding: 8px; font-size: 0.8rem; border-radius: 6px; }

    .app-modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(15, 23, 42, 0.4); display: flex; justify-content: center; align-items: center; z-index: 10000; }
    .app-modal { background: var(--card-bg); border: 1px solid var(--border-color); width: calc(100% - 40px); max-width: 320px; border-radius: 12px; padding: 14px; text-align: center; }
    .modal-actions { display: flex; gap: 6px; margin-top: 12px; }

    .toast-container { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: calc(100% - 32px); max-width: 380px; }
    .toast { background: var(--card-bg); border-left: 4px solid var(--primary); padding: 10px; border-radius: 6px; box-shadow: var(--panel-shadow); display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 0.85rem; }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }

    .spinner-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.2); z-index: 9998; display: flex; justify-content: center; align-items: center; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="top-actions">
    <button class="circle-btn" id="btn-all-close"><span class="material-icons">close</span></button>
    <button class="circle-btn" id="btn-theme-toggle"><span class="material-icons" id="theme-icon">dark_mode</span></button>
  </div>

  <div class="container">
    <header>
      <h1>Daily QR Scanner</h1>
      <p>Warehouse Operational System</p>
    </header>

    <div class="card" id="home-panel">
      <button class="btn btn-primary" id="btn-daily-scan">
        <span class="material-icons">qr_code_scanner</span> Daily Scan
      </button>

      <div class="slide-panel" id="mode-panel">
        <div class="mode-indicators">
          <button class="btn btn-mode-p" id="btn-mode-pickup"><span class="material-icons">local_shipping</span>Pickup</button>
          <button class="btn btn-mode-r" id="btn-mode-return"><span class="material-icons">assignment_return</span>Return</button>
        </div>
      </div>
    </div>

    <div class="card hidden" id="action-selection-panel">
      <div class="sub-panel">
        <div class="mode-indicators">
          <button class="btn btn-secondary" id="btn-action-camera"><span class="material-icons">photo_camera</span>Camera</button>
          <button class="btn btn-secondary" id="btn-action-manual"><span class="material-icons">keyboard</span>Manual</button>
        </div>
      </div>
    </div>

    <div class="card hidden" id="input-panel">
      <div class="sub-panel">
        <div id="scanner-container" class="hidden"><div id="qr-reader"></div></div>
        <div id="manual-container" class="hidden">
          <input type="text" id="awb-input" class="text-input" placeholder="Enter or Scan AWB Number">
        </div>
      </div>
    </div>

    <div class="card hidden" id="result-panel">
      <div class="sub-panel">
        <table class="result-table">
          <tr><td>AWB</td><td id="res-awb">-</td></tr>
          <tr><td>Order ID</td><td id="res-order-id">-</td></tr>
          <tr><td>Status</td><td id="res-status">-</td></tr>
          <tr><td>Mode</td><td id="res-mode">-</td></tr>
          <tr><td>Date</td><td id="res-date">-</td></tr>
          <tr><td>Time</td><td id="res-time">-</td></tr>
        </table>
        <div style="display: flex; flex-direction: column; gap: 6px; margin-top: 6px;">
          <button class="btn btn-success" id="btn-save"><span class="material-icons">save</span>Save Entry</button>
          <button class="btn btn-secondary" id="btn-close"><span class="material-icons">close</span>Close</button>
        </div>
      </div>
    </div>

    <div class="card" id="count-panel">
      <div class="count-header">
        <h3 style="font-size:1rem;">Daily Counts</h3>
        <button class="circle-btn" id="btn-refresh-counts" style="width:30px; height:30px;"><span class="material-icons" style="font-size:14px;">refresh</span></button>
      </div>
      
      <div class="filter-bar">
        <input type="date" id="count-date-filter" class="date-picker">
        <button class="clear-filter-btn" id="btn-clear-date"><span class="material-icons">clear</span></button>
      </div>

      <div id="bulk-operational-panel" class="bulk-operational-tab hidden">
        <div style="font-size:0.75rem; font-weight:600; color:var(--primary);">Bulk Processing Target: <span id="lbl-bulk-date"></span></div>
        <div class="bulk-grid">
          <button class="btn btn-success btn-bulk" id="btn-bulk-pickup">Pickup Bulk</button>
          <button class="btn btn-mode-r active btn-bulk" id="btn-bulk-return">Return Bulk</button>
        </div>
      </div>

      <div id="tree-container"></div>
    </div>
  </div>

  <div id="custom-confirm-modal" class="app-modal-overlay hidden">
    <div class="app-modal">
      <h4>Confirm Sync Block</h4>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-top:4px;">Are you sure you want to initialize the dynamic processing script?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" style="padding:8px;" id="btn-modal-no">Cancel</button>
        <button class="btn btn-primary" style="padding:8px;" id="btn-modal-yes">Confirm</button>
      </div>
    </div>
  </div>

  <div class="spinner-overlay hidden" id="loading-spinner"><div class="spinner"></div></div>
  <div class="toast-container" id="toast-container"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwS7HmWoqdBsFe_bC5a8VgMwiggBqhT3unhyj6jkTZmchsIUN892wFj3s-e-7tKdtMJsA/exec";

    const state = { currentMode: null, currentMethod: null, html5QrcodeScanner: null, scannedData: null, allLogs: [], filteredDate: null, pendingBulkMode: null };

    const ui = {
      btnAllClose: document.getElementById('btn-all-close'), btnThemeToggle: document.getElementById('btn-theme-toggle'), themeIcon: document.getElementById('theme-icon'),
      btnDailyScan: document.getElementById('btn-daily-scan'), modePanel: document.getElementById('mode-panel'), btnModePickup: document.getElementById('btn-mode-pickup'),
      btnModeReturn: document.getElementById('btn-mode-return'), actionSelectionPanel: document.getElementById('action-selection-panel'), btnActionCamera: document.getElementById('btn-action-camera'),
      btnActionManual: document.getElementById('btn-action-manual'), inputPanel: document.getElementById('input-panel'), scannerContainer: document.getElementById('scanner-container'),
      manualContainer: document.getElementById('manual-container'), awbInput: document.getElementById('awb-input'), resultPanel: document.getElementById('result-panel'),
      btnSave: document.getElementById('btn-save'), btnClose: document.getElementById('btn-close'), spinner: document.getElementById('loading-spinner'),
      toastContainer: document.getElementById('toast-container'), resAwb: document.getElementById('res-awb'), resOrderId: document.getElementById('res-order-id'),
      resStatus: document.getElementById('res-status'), resMode: document.getElementById('res-mode'), resDate: document.getElementById('res-date'), resTime: document.getElementById('res-time'),
      treeContainer: document.getElementById('tree-container'), dateFilter: document.getElementById('count-date-filter'), btnClearDate: document.getElementById('btn-clear-date'),
      btnRefreshCounts: document.getElementById('btn-refresh-counts'), bulkPanel: document.getElementById('bulk-operational-panel'), lblBulkDate: document.getElementById('lbl-bulk-date'),
      btnBulkPickup: document.getElementById('btn-bulk-pickup'), btnBulkReturn: document.getElementById('btn-bulk-return'), confirmModal: document.getElementById('custom-confirm-modal'),
      btnModalYes: document.getElementById('btn-modal-yes'), btnModalNo: document.getElementById('btn-modal-no')
    };

    function showToast(title, message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<div><strong>${title}</strong>: ${message}</div>`;
      ui.toastContainer.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3000);
    }

    function showSpinner(show) {
      if (show) ui.spinner.classList.remove('hidden');
      else ui.spinner.classList.add('hidden');
    }

    async function makeApiCall(data) {
      showSpinner(true);
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
        const json = await response.json();
        showSpinner(false);
        return json;
      } catch (error) {
        showSpinner(false);
        showToast('Bridge Error', 'Network layer validation failed.', 'error');
        return { success: false, error: error.toString() };
      }
    }

    function getFormattedDateTime() {
      const now = new Date();
      const date = now.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
      return { date, time };
    }

    function parseSheetDate(str) {
      const parts = str.split('/');
      if(parts.length === 3) return { day: parts[0], month: parts[1], year: parts[2] };
      return null;
    }

    async function loadCounts() {
      const response = await makeApiCall({ action: 'getCounts' });
      if (response && response.success) {
        state.allLogs = response.logs || [];
        renderTree();
      }
    }

    function renderTree() {
      ui.treeContainer.innerHTML = '';
      const tree = {};
      
      state.allLogs.forEach(log => {
        const parsed = parseSheetDate(log.date);
        if(!parsed) return;
        const { day, month, year } = parsed;
        if (state.filteredDate) {
          const fd = state.filteredDate.split('-'); 
          if (year !== fd[0] || month !== fd[1] || day !== fd[2]) return;
        }
        if (!tree[year]) tree[year] = { p: 0, r: 0, months: {} };
        if (!tree[year].months[month]) tree[year].months[month] = { p: 0, r: 0, days: {} };
        if (!tree[year].months[month].days[day]) tree[year].months[month].days[day] = { p: 0, r: 0 };
        
        if (log.mode === 'Pickup') { tree[year].p++; tree[year].months[month].p++; tree[year].months[month].days[day].p++; } 
        else { tree[year].r++; tree[year].months[month].r++; tree[year].months[month].days[day].r++; }
      });

      Object.keys(tree).sort().reverse().forEach(year => {
        const yNode = createNode(`Year: ${year}`, tree[year].p, tree[year].r);
        const yContent = yNode.querySelector('.tree-content');
        Object.keys(tree[year].months).sort().reverse().forEach(month => {
          const mNode = createNode(`Month ${month}`, tree[year].months[month].p, tree[year].months[month].r);
          const mContent = mNode.querySelector('.tree-content');
          Object.keys(tree[year].months[month].days).sort().reverse().forEach(day => {
            const dNode = createNode(`Date: ${day}/${month}/${year}`, tree[year].months[month].days[day].p, tree[year].months[month].days[day].r, true);
            mContent.appendChild(dNode);
          });
          yContent.appendChild(mNode);
        });
        ui.treeContainer.appendChild(yNode);
      });
    }

    function createNode(label, pCount, rCount, isLeaf = false) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      div.innerHTML = `
        <div class="tree-header">
          <span>${label}</span>
          <div class="tree-chips"><span class="chip chip-p">P: ${pCount}</span><span class="chip chip-r">R: ${rCount}</span></div>
        </div>
        ${!isLeaf ? '<div class="tree-content"></div>' : ''}
      `;
      if (!isLeaf) {
        div.querySelector('.tree-header').addEventListener('click', () => {
          const c = div.querySelector('.tree-content');
          c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        });
      }
      return div;
    }

    async function handleAwbSubmission(awb) {
      if (!awb || awb.trim() === "") return;
      await stopCamera();
      const response = await makeApiCall({ action: 'fetchDelhivery', awb: awb.trim() });
      if (response && response.success) {
        const dateTime = getFormattedDateTime();
        state.scannedData = { awb: response.data.awb, orderId: response.data.orderId, status: response.data.status, mode: state.currentMode, date: dateTime.date, time: dateTime.time };
        ui.resAwb.textContent = state.scannedData.awb;
        ui.resOrderId.textContent = state.scannedData.orderId;
        ui.resStatus.textContent = state.scannedData.status;
        ui.resMode.innerHTML = `<span class="badge badge-${state.currentMode.toLowerCase()}">${state.currentMode}</span>`;
        ui.resDate.textContent = state.scannedData.date;
        ui.resTime.textContent = state.scannedData.time;
        ui.resultPanel.classList.remove('hidden');
      } else {
        showToast('Fetch Failed', 'API validation rejected.', 'error');
      }
    }

    async function startCamera() {
      ui.scannerContainer.classList.remove('hidden');
      ui.inputPanel.classList.remove('hidden');
      if(typeof Html5Qrcode === 'undefined') { showToast('Engine Pending', 'Library optimization mapping state...', 'error'); return;}
      state.html5QrcodeScanner = new Html5Qrcode("qr-reader");
      try {
        await state.html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => { handleAwbSubmission(text); });
      } catch (err) { showToast('Hardware Block', 'Camera device initiation error.', 'error'); }
    }

    async function stopCamera() {
      if (state.html5QrcodeScanner && state.html5QrcodeScanner.isScanning) {
        try { await state.html5QrcodeScanner.stop(); } catch(e){}
      }
      ui.scannerContainer.classList.add('hidden');
    }

    function initInterface() {
      ui.btnThemeToggle.addEventListener('click', () => { document.documentElement.toggleAttribute('data-theme'); });
      ui.btnAllClose.addEventListener('click', () => { stopCamera(); ui.inputPanel.classList.add('hidden'); ui.resultPanel.classList.add('hidden'); ui.actionSelectionPanel.classList.add('hidden'); ui.modePanel.classList.remove('open'); });
      ui.btnDailyScan.addEventListener('click', () => { ui.modePanel.classList.toggle('open'); });
      ui.btnModePickup.addEventListener('click', () => { state.currentMode = 'Pickup'; ui.actionSelectionPanel.classList.remove('hidden'); });
      ui.btnModeReturn.addEventListener('click', () => { state.currentMode = 'Return'; ui.actionSelectionPanel.classList.remove('hidden'); });
      ui.btnActionCamera.addEventListener('click', () => { state.currentMethod = 'camera'; ui.manualContainer.classList.add('hidden'); startCamera(); });
      ui.btnActionManual.addEventListener('click', () => { state.currentMethod = 'manual'; stopCamera(); ui.inputPanel.classList.remove('hidden'); ui.manualContainer.classList.remove('hidden'); ui.awbInput.focus(); });
      
      ui.awbInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAwbSubmission(ui.awbInput.value); });
      
      ui.btnSave.addEventListener('click', async () => {
        if (!state.scannedData) return;
        const res = await makeApiCall({ action: 'saveData', payload: state.scannedData });
        if (res && res.success) {
          showToast('Success', 'Record synchronization active.');
          ui.resultPanel.classList.add('hidden');
          loadCounts();
        } else { showToast('Error', 'Storage operation rejected.', 'error'); }
      });

      ui.dateFilter.addEventListener('input', (e) => {
        state.filteredDate = e.target.value;
        if(state.filteredDate) { ui.lblBulkDate.innerText = state.filteredDate; ui.bulkPanel.classList.remove('hidden'); }
        renderTree();
      });

      ui.btnClearDate.addEventListener('click', () => { ui.dateFilter.value = ''; state.filteredDate = null; ui.bulkPanel.classList.add('hidden'); renderTree(); });
      
      ui.btnBulkPickup.addEventListener('click', () => { state.pendingBulkMode = 'pickup'; ui.customConfirmModal.classList.remove('hidden'); });
      ui.btnBulkReturn.addEventListener('click', () => { state.pendingBulkMode = 'return'; ui.customConfirmModal.classList.remove('hidden'); });
      
      ui.btnModalYes.addEventListener('click', async () => {
        ui.customConfirmModal.classList.add('hidden');
        const res = await makeApiCall({ action: 'processBulkFetch', date: state.filteredDate, mode: state.pendingBulkMode });
        if(res && res.success) { showToast('Complete', res.message); loadCounts(); }
        else showToast('Failed', res.error, 'error');
      });
      ui.btnModalNo.addEventListener('click', () => ui.customConfirmModal.classList.add('hidden'));
      ui.btnRefreshCounts.addEventListener('click', loadCounts);

      loadCounts();
    }
    window.addEventListener('DOMContentLoaded', initInterface);
  </script>
</body>
</html>
