<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Harsidhi Ventures Find & Update Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif }
        body { background: #f3f6fb; min-height: 100vh; color: #1f2937; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; font-size: 22px; font-weight: 700; color: #2563eb; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;}
        .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, .05); display: flex; flex-direction: column; gap: 15px; }
        .panel-header { font-weight: 700; font-size: 16px; color: #374151; border-bottom: 1px solid #eef2f7; padding-bottom: 10px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .search-box { display: flex; flex-direction: column; gap: 12px; }
        .input { height: 46px; padding: 0 14px; border: 1px solid #dbe2ea; border-radius: 12px; outline: none; background: #fff; font-size: 14px; width: 100%; }
        .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .12) }
        .btn { border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; text-align: center; width: 100%; display: block; }
        .btn:hover { transform: translateY(-1px); opacity: .95 }
        .btn-search { background: #2563eb; color: #fff }
        .btn-sync { background: #10b981; color: #fff; margin-top: 10px; }
        .btn-refresh { background: #475569; color: #fff; margin-top: 10px; }
        .search-result { margin-top: 5px; }
        .card { padding: 16px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, .03); font-size: 14px; line-height: 1.6; }
        .card h3 { font-size: 15px; margin-bottom: 10px; color: #1e3a8a; display: flex; align-items: center; gap: 5px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 6px; }
        .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f8fafc; }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { color: #0f172a; font-weight: 600; text-align: right; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-pickup { background: #dbeafe; color: #1e40af; }
        .badge-return { background: #ccfbf1; color: #115e59; }
        .status-msg { font-style: italic; color: #64748b; text-align: center; padding: 15px 0; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; padding: 12px 16px; border-radius: 12px; z-index: 9999; box-shadow: 0 8px 20px rgba(0, 0, 0, .2); font-size: 13px; font-weight: 500; }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, .85); backdrop-filter: blur(4px); z-index: 99999; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #2563eb }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">Harsidhi Ventures</div>
        
        <div class="panel">
            <div class="panel-header">🔍 Find & Sync Order Status</div>
            
            <div class="search-box">
                <input id="searchInput" class="input" placeholder="Enter AWB Number / Order ID">
                <button class="btn btn-search" onclick="searchOrder()">Search Order</button>
            </div>
            
            <div id="searchResult" class="search-result">
                <div class="status-msg">Enter a keyword above to look up records from Google Sheet.</div>
            </div>
        </div>
    </div>

    <!-- Global Fullscreen Loader -->
    <div id="loadingOverlay">Processing, please wait...</div>

    <script>
        /* ===================================
        CONFIG
        =================================== */
        // Yahan par apna exact Google Apps Script Web App URL paste karein
        const API_URL = "https://script.google.com/macros/s/AKfycbyBR10FMSEz7trq0JUkEZwKRv64AlIX0D5ZZn4LXe7zvMsU1rr66CN8RZ6AbSE_2x8o/exec"; 

        /* ===================================
        GLOBAL VARIABLES
        =================================== */
        let currentRecord = null;
        let latestTrackingData = null;

        /* ===================================
        SEARCH ORDER (FROM GOOGLE SHEET)
        =================================== */
        async function searchOrder() {
            const keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) {
                toast("Please enter AWB or Order ID");
                return;
            }

            const resultBox = document.getElementById("searchResult");
            resultBox.innerHTML = "<div class='status-msg'>Searching Google Sheet records...</div>";
            showLoader();

            try {
                const response = await fetch(`${API_URL}?action=searchOrder&keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();
                hideLoader();

                if (!data.success) {
                    resultBox.innerHTML = `
                        <div class="card" style="border-left: 4px solid #ef4444;">
                            <b style="color: #dc2626;">No Record Found</b><br>
                            <span style="color:#64748b; font-size:13px;">Yeh AWB/Order ID Google Sheet par abhi tak scan nahi kiya gaya hai.</span>
                        </div>`;
                    return;
                }

                currentRecord = data; // Cache spreadsheet data
                renderSearchResult(data);

            } catch (err) {
                hideLoader();
                console.error(err);
                resultBox.innerHTML = "<div class='card' style='color:red;'>Error connecting to Server. Please verify API_URL.</div>";
            }
        }

        /* ===================================
        RENDER SPREADSHEET SEARCH RESULT
        =================================== */
        function renderSearchResult(data) {
            const typeBadge = data.type === "Pickup" ? "badge-pickup" : "badge-return";
            
            document.getElementById("searchResult").innerHTML = `
                <div class="card" style="border-left: 4px solid #2563eb;">
                    <h3>📋 Google Sheet Record</h3>
                    <div class="info-row"><span class="info-label">Scan Date:</span><span class="info-value">${data.date || "N/A"}</span></div>
                    <div class="info-row"><span class="info-label">Operation Type:</span><span class="info-value"><span class="badge ${typeBadge}">${data.type}</span></span></div>
                    <div class="info-row"><span class="info-label">AWB Number:</span><span class="info-value">${data.awb}</span></div>
                    <div class="info-row"><span class="info-label">Order ID:</span><span class="info-value">${data.orderId || "N/A"}</span></div>
                    <div class="info-row"><span class="info-label">Courier Partner:</span><span class="info-value">${data.courier || "N/A"}</span></div>
                    <div class="info-row"><span class="info-label">Current Status:</span><span class="info-value" style="color:#2563eb;">${data.status || "Pending"}</span></div>
                    <div class="info-row"><span class="info-label">Customer Name:</span><span class="info-value">${data.customer || "N/A"}</span></div>
                    <div class="info-row"><span class="info-label">City / State:</span><span class="info-value">${data.city || "N/A"} ${data.state ? ', '+data.state : ''}</span></div>
                    
                    <button class="btn btn-refresh" onclick="fetchLiveCourierTracking('${data.awb}')">🌐 Fetch Live Status</button>
                    <div id="liveTrackingBox" style="margin-top: 12px;"></div>
                </div>
            `;
        }

        /* ===================================
        FETCH LIVE API STATUS (DELHIVERY / BOXD)
        =================================== */
        async function fetchLiveCourierTracking(awb) {
            const liveBox = document.getElementById("liveTrackingBox");
            liveBox.innerHTML = "<div class='status-msg'>Hitting Courier API Gateways (Boxd/Delhivery)...</div>";
            showLoader();

            try {
                const response = await fetch(`${API_URL}?action=trackShipment&awb=${encodeURIComponent(awb)}`);
                const data = await response.json();
                hideLoader();

                if (!data.success) {
                    liveBox.innerHTML = `
                        <div class="card" style="background: #fdf2f2; border: 1px solid #fca5a5; font-size:13px; color: #991b1b;">
                            ⚠️ <b>Courier API Response:</b> Tracking details not found on active 3PL channels.
                        </div>`;
                    return;
                }

                latestTrackingData = data; // Cache API result

                liveBox.innerHTML = `
                    <div class="card" style="background: #f8fafc; border: 1px dashed #cbd5e1; margin-top: 10px;">
                        <h3>🚚 Live Courier Server Status (${data.courierName || data.courier})</h3>
                        <div class="info-row"><span class="info-label">Latest Status:</span><span class="info-value" style="color:#10b981;">${data.status || "N/A"}</span></div>
                        <div class="info-row"><span class="info-label">Live City Loc:</span><span class="info-value">${data.city || "N/A"}</span></div>
                        <div class="info-row"><span class="info-label">Pickup Date:</span><span class="info-value">${data.pickupDate || "N/A"}</span></div>
                        <div class="info-row"><span class="info-label">Delivered Date:</span><span class="info-value">${data.deliveredDate || "N/A"}</span></div>
                        <div class="info-row"><span class="info-label">Expected Delv:</span><span class="info-value">${data.expectedDate || "N/A"}</span></div>
                        <div class="info-row"><span class="info-label">RTO Flagged:</span><span class="info-value">${data.isRTO ? "⚠️ YES" : "NO"}</span></div>
                        
                        <button class="btn btn-sync" onclick="syncLatestStatusToSheet()">💾 Sync Status To Sheet</button>
                    </div>
                `;
            } catch (err) {
                hideLoader();
                console.error(err);
                liveBox.innerHTML = "<div class='status-msg' style='color:red;'>Failed to pull live tracking API info.</div>";
            }
        }

        /* ===================================
        SYNC/UPDATE DATA BACK TO GOOGLE SHEET
        =================================== */
        async function syncLatestStatusToSheet() {
            if (!latestTrackingData) {
                toast("No updated data available to sync");
                return;
            }

            showLoader();
            try {
                const response = await fetch(`${API_URL}?action=updateSingleAWB&awb=${encodeURIComponent(latestTrackingData.awb)}`);
                const result = await response.json();
                hideLoader();

                if (result.success) {
                    if (result.skipped) {
                        toast(`Skipped: Row is locked under '${result.reason}' status!`);
                    } else {
                        toast("🎉 Sheet row synced & saved successfully!");
                    }
                    // Re-trigger sheet search to fetch updated data grid values
                    searchOrder();
                } else {
                    toast(result.message || "Update request failed at Sheet grid level.");
                }
            } catch (err) {
                hideLoader();
                console.error(err);
                toast("Error while executing Sheet update script.");
            }
        }

        /* ===================================
        ENTER KEYPAD BINDING FOR INPUT BOX
        =================================== */
        document.getElementById("searchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                searchOrder();
            }
        });

        /* ===================================
        UI HELPERS
        =================================== */
        function showLoader() { document.getElementById("loadingOverlay").style.display = "flex"; }
        function hideLoader() { document.getElementById("loadingOverlay").style.display = "none"; }
        function toast(msg) {
            const t = document.createElement("div");
            t.className = "toast"; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        window.onload = function() {
            if(API_URL === "YOUR_SPREADSHEET_WEB_APP_URL_HERE") {
                document.getElementById("searchResult").innerHTML = "<div class='card' style='color:red; font-weight:bold; text-align:center;'>⚠️ API_URL line 86 par set karein!</div>";
            }
        };
    </script>
</body>

</html>
