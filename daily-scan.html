<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Daily Scan Station</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>.active-menu { background-color: #3b82f6 !important; color: white !important; }</style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
  <div class="w-64 bg-slate-900 text-gray-300 flex flex-col justify-between shadow-lg"><div><div class="p-5 text-xl font-bold text-white border-b border-slate-800 tracking-wider">📦 SCAN ENGINE</div><nav class="mt-5 px-3 space-y-1"><a href="index.html" id="btn-dashboard" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📊 Dashboard</a><a href="daily-scan.html" id="btn-daily-scan" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🔍 Daily Scan</a><a href="tracking.html" id="btn-tracking" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📦 Tracking Engine</a><a href="inventory.html" id="btn-inventory" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🏭 Inventory</a><a href="payment.html" id="btn-payment" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">💳 Payment</a><a href="setting.html" id="btn-setting" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">⚙️ Settings</a></nav></div></div>
  
  <div class="flex-1 flex flex-col overflow-y-auto">
    <header class="bg-white shadow-sm px-6 py-4"><h1 class="text-xl font-semibold text-gray-800">Operational Scan Station</h1></header>
    <main class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
        <h2 class="text-lg font-bold text-gray-700">🔍 Single Barcode Input</h2>
        <div class="grid grid-cols-2 gap-2">
          <div><label class="block text-xs font-medium text-gray-500">Operation Mode</label><select id="scanMode" class="mt-1 w-full p-2 border rounded"><option value="Pickup">Pickup</option><option value="Return">Return</option></select></div>
          <div><label class="block text-xs font-medium text-gray-500">Date</label><input type="date" id="scanDate" class="mt-1 w-full p-2 border rounded"></div>
        </div>
        <div><label class="block text-xs font-medium text-gray-500">AWB Number / Scan Focus</label><input type="text" id="awbInput" placeholder="Focus scanner or type AWB..." class="mt-1 w-full p-3 border rounded text-lg font-mono focus:ring-2 focus:ring-blue-500" onkeypress="if(event.key === 'Enter') submitSingleScan()"></div>
        <button onclick="submitSingleScan()" class="w-full bg-blue-600 text-white font-medium p-2.5 rounded hover:bg-blue-700">Record Transaction</button>
        <p id="scanResponse" class="text-sm font-medium mt-2 text-gray-500"></p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
        <h2 class="text-lg font-bold text-gray-700">📑 Bulk Manifest Stream</h2>
        <div><label class="block text-xs font-medium text-gray-500">Bulk Operation Mode</label><select id="bulkMode" class="mt-1 w-full p-2 border rounded"><option value="Pickup">Pickup</option><option value="Return">Return</option></select></div>
        <div><label class="block text-xs font-medium text-gray-500">Paste AWBs (One Number Per Line)</label><textarea id="bulkTextarea" rows="4" placeholder="AWB123445&#10;AWB543210" class="mt-1 w-full p-2 border rounded font-mono text-sm"></textarea></div>
        <button onclick="submitBulkScans()" class="w-full bg-slate-800 text-white font-medium p-2.5 rounded hover:bg-slate-900">Upload Bulk Set</button>
        <p id="bulkResponse" class="text-sm font-medium mt-2 text-gray-500"></p>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
