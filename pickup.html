<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Harsidhi Ventures - Pickup Mapping Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif }
        body { background: #fdf2f2; min-height: 100vh; color: #1f2937; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 16px 20px; border-radius: 14px; border: 1px solid #fee2e2; border-left: 5px solid #dc2626; }
        
        /* Mapping Cards Layout */
        .row-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,.01); display: flex; flex-direction: column; gap: 12px; position: relative; }
        .row-card.pending { border-left: 6px solid #ef4444; background: #fff8f8; }
        .row-card.processed { border-left: 6px solid #10b981; background: #f0fdf4; opacity: 0.85; }
        
        .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; font-size: 13px; font-weight: 500; }
        .meta-grid div span { color: #64748b; font-weight: 400; display: block; font-size: 11px; text-transform: uppercase; }

        /* Multi SKU Dynamic Segment */
        .sku-mapping-zone { border-top: 1px dashed #cbd5e1; padding-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .sku-input-row { display: flex; gap: 8px; align-items: center; }
        
        .input, select { height: 38px; padding: 0 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 13px; }
        .select-sku { flex: 2; }
        .input-qty { width: 80px; text-align: center; }
        
        /* Mini Buttons */
        .btn-mini { background: #64748b; color: white; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 15px; }
        .btn-mini.add { background: #2563eb; }
        .btn-mini.remove { background: #ef4444; }
        
        .status-badge { position: absolute; top: 16px; right: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; }
        .pending .status-badge { background: #fee2e2; color: #991b1b; }
        .processed .status-badge { background: #dcfce7; color: #166534; }

        .btn-save { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; align-self: flex-end; }
        .btn-save:hover { background: #b91c1c; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; padding: 12px 16px; border-radius: 12px; z-index: 9999; font-size: 13px; }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, .85); backdrop-filter: blur(4px); z-index: 99999; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #dc2626 }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h2 style="color:#b91c1c;">📦 Live Pickups Mapping Board</h2>
                <p style="font-size:12px; color:#64748b; margin-top:2px;">Mapped SKUs will increment 'Sales' to automatically reduce Net Stock.</p>
            </div>
            <button class="btn-save" style="background:#475569;" onclick="loadPickupRows()">🔄 Sync Grid</button>
        </div>

        <!-- Dynamic List Container -->
        <div id="pickupRowsList" style="display:flex; flex-direction:column; gap:14px;">
            <div style="text-align:center; padding:30px; color:gray; font-style:italic;">Querying filtered entries...</div>
        </div>
    </div>

    <div id="loadingOverlay">Processing Stock Balancing Nodes...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyBR10FMSEz7trq0JUkEZwKRv64AlIX0D5ZZn4LXe7zvMsU1rr66CN8RZ6AbSE_2x8o/exec";
        let skuDirectoryList = [];

        async function loadPickupRows() {
            showLoader();
            try {
                // 1. Load active SKU directory list first
                if(skuDirectoryList.length === 0) {
                    const skuRes = await fetch(`${API_URL}?action=inventoryProducts`);
                    const skuData = await skuRes.json();
                    if(skuData.success) skuDirectoryList = skuData.products || [];
                }

                // 2. Fetch filtered Pickup Rows from Daily-Scan sheet
                const response = await fetch(`${API_URL}?action=getFilteredDailyRows&type=Pickup`);
                const result = await response.json();
                hideLoader();

                if(result.success) {
                    renderPickupCards(result.rows || []);
                }
            } catch(e) { hideLoader(); toast("Error connecting to script engine."); }
        }

        function renderPickupCards(rows) {
            const container = document.getElementById("pickupRowsList");
            if(rows.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; background:white; border-radius:12px;">No pickup row logs found.</div>`;
                return;
            }

            let html = "";
            rows.forEach(r => {
                const cardState = r.isProcessed ? "processed" : "pending";
                const statusText = r.isProcessed ? "SKU Mapped (Green)" : "Required SKU (Red Mark)";
                
                html += `
                    <div class="row-card ${cardState}" id="card-block-${r.rowId}">
                        <span class="status-badge">${statusText}</span>
                        <div class="meta-grid">
                            <div><span>Scan Date</span><b>${r.date}</b></div>
                            <div><span>AWB Number</span><b>${r.awb}</b></div>
                            <div><span>Order Reference</span><b>${r.orderId || 'N/A'}</b></div>
                            <div><span>Courier Courier</span><b>${r.courier || 'N/A'}</b></div>
                        </div>

                        ${!r.isProcessed ? `
                            <div class="sku-mapping-zone">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <label style="font-size:12px; font-weight:700; color:#475569;">Assign Products Mapped to AWB</label>
                                    <button class="btn-mini add" onclick="addNewSkuRowLine('${r.rowId}')" type="button">+</button>
                                </div>
                                <div id="sku-fields-container-${r.rowId}" style="display:flex; flex-direction:column; gap:6px;">
                                    <!-- Dynamic Rows populate here -->
                                    <div class="sku-input-row">
                                        <select class="select-sku" id="sku-sel-${r.rowId}-0">${generateSkuOptionsHtml()}</select>
                                        <input type="number" class="input input-qty" id="sku-qty-${r.rowId}-0" min="1" value="1" placeholder="Qty">
                                        <button class="btn-mini remove" onclick="this.parentElement.remove()">-</button>
                                    </div>
                                </div>
                                <button class="btn-save" onclick="savePickupSkuMapping('${r.rowId}')" style="margin-top:5px;">Confirm & Deduct Stock</button>
                            </div>
                        ` : `<div style="font-size:12px; color:#166534; font-weight:600; border-top:1px dashed #cbd5e1; padding-top:6px;">✨ Transaction processed successfully into master database.</div>`}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function generateSkuOptionsHtml() {
            let options = '<option value="">-- Choose SKU --</option>';
            skuDirectoryList.forEach(p => {
                options += `<option value="${p.sku}">${p.sku}</option>`;
            });
            return options;
        }

        function addNewSkuRowLine(rowId) {
            const container = document.getElementById(`sku-fields-container-${rowId}`);
            const uniqueIndex = container.children.length;
            const newRow = document.createElement("div");
            newRow.className = "sku-input-row";
            newRow.innerHTML = `
                <select class="select-sku" id="sku-sel-${rowId}-${uniqueIndex}">${generateSkuOptionsHtml()}</select>
                <input type="number" class="input input-qty" id="sku-qty-${rowId}-${uniqueIndex}" min="1" value="1">
                <button class="btn-mini remove" onclick="this.parentElement.remove()">-</button>
            `;
            container.appendChild(newRow);
        }

        async function savePickupSkuMapping(rowId) {
            const container = document.getElementById(`sku-fields-container-${rowId}`);
            const skuItems = [];

            // Compile array datasets dynamically
            for(let child of container.children) {
                const selectEl = child.querySelector(".select-sku");
                const qtyEl = child.querySelector(".input-qty");
                
                if(selectEl && selectEl.value && qtyEl && qtyEl.value) {
                    skuItems.push({ sku: selectEl.value, qty: parseInt(qtyEl.value, 10) });
                }
            }

            if(skuItems.length === 0) { toast("Select at least 1 valid SKU code entry."); return; }

            showLoader();
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "processDailyRowSku",
                        payload: { rowId: rowId, type: "Pickup", skuItems: skuItems }
                    })
                });
                const res = await response.json();
                hideLoader();
                if(res.success) {
                    toast("🎉 Saved & Grid updated green!");
                    loadPickupRows(); // Instantly hot refresh view states
                }
            } catch(e) { hideLoader(); toast("Failed saving entry data."); }
        }

        function showLoader() { document.getElementById("loadingOverlay").style.display = "flex"; }
        function hideLoader() { document.getElementById("loadingOverlay").style.display = "none"; }
        function toast(msg) {
            const t = document.createElement("div"); t.className = "toast"; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
        }
        window.onload = loadPickupRows;
    </script>
</body>
</html>
