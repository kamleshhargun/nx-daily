<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Tracking Pipeline</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>.active-menu { background-color: #3b82f6 !important; color: white !important; }</style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
  <div class="w-64 bg-slate-900 text-gray-300 flex flex-col justify-between shadow-lg"><div><div class="p-5 text-xl font-bold text-white border-b border-slate-800 tracking-wider">📦 SCAN ENGINE</div><nav class="mt-5 px-3 space-y-1"><a href="index.html" id="btn-dashboard" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📊 Dashboard</a><a href="daily-scan.html" id="btn-daily-scan" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🔍 Daily Scan</a><a href="tracking.html" id="btn-tracking" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">📦 Tracking Engine</a><a href="inventory.html" id="btn-inventory" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">🏭 Inventory</a><a href="payment.html" id="btn-payment" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">💳 Payment</a><a href="setting.html" id="btn-setting" class="menu-btn block px-4 py-3 text-sm rounded-lg hover:bg-slate-800 hover:text-white">⚙️ Settings</a></nav></div></div>

  <div class="flex-1 flex flex-col overflow-y-auto">
    <header class="bg-white shadow-sm px-6 py-4"><h1 class="text-xl font-semibold text-gray-800">Delhivery API Gateway</h1></header>
    <main class="p-6 space-y-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border max-w-2xl space-y-3">
        <h2 class="text-lg font-bold text-gray-700">🔍 Live Individual Waybill Query</h2>
        <div class="flex gap-2">
          <input type="text" id="trackAwbInput" placeholder="Enter Delhivery AWB number..." class="flex-1 p-2 border rounded font-mono">
          <button onclick="performLiveTracking()" class="bg-blue-600 text-white px-5 rounded hover:bg-blue-700 font-medium">Fetch Live Metrics</button>
        </div>
        <div id="trackingInfoBox" class="mt-4"></div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border max-w-2xl space-y-4">
        <div>
          <h2 class="text-lg font-bold text-gray-700">⚡ Bulk Sheet Inline API Sync Engine</h2>
          <p class="text-xs text-gray-400 mt-0.5">Yeh process target date aur mode ke sabhi entries ko scan karke Sheet me Columns G se R tak data inline bhar dega.</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-medium text-gray-500">Target Entry Date</label><input type="date" id="bulkTargetDate" class="mt-1 w-full p-2 border rounded"></div>
          <div><label class="block text-xs font-medium text-gray-500">Target Mode Filter</label><select id="bulkTargetMode" class="mt-1 w-full p-2 border rounded"><option value="Pickup">Pickup</option><option value="Return">Return</option></select></div>
        </div>
        <button onclick="triggerBulkDaySync()" class="w-full bg-slate-800 text-white py-2.5 rounded font-medium hover:bg-slate-900 shadow-sm">Execute Bulk API Automation Sync</button>
        <p id="bulkSyncResponse" class="text-sm text-gray-500 font-medium mt-1"></p>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
